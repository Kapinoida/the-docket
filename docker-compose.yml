version: '3.8'

services:
  app:
    build: .
    container_name: the-docket-app
    restart: always
    env_file: .env.local
    environment:
      TZ: America/Chicago
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DATABASE_URL: postgres://postgres:***@postgres:5432/the_docket
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: the_docket
      DOCKET_PASSWORD: ${DOCKET_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-docket-jwt-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal-net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  nginx:
    image: nginx:alpine
    container_name: the-docket-nginx
    restart: always
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - internal-net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  postgres:
    image: postgres:15
    container_name: the-docket-db
    restart: always
    environment:
      POSTGRES_DB: the_docket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      TZ: America/Chicago
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d the_docket"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal-net
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

volumes:
  postgres_data:

networks:
  internal-net:
    driver: bridge