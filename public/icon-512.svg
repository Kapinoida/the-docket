      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Clipboard body -->
  <rect x="148" y="128" width="216" height="280" rx="24" fill="white" opacity="0.95"/>
