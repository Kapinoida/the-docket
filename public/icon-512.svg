            fill="none" stroke="#2563eb" stroke-width="24" 
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lines (task items) -->
  <line x1="188" y1="352" x2="270" y2="352" stroke="#94a3b8" stroke-width="10" stroke-linecap="round"/>
  <line x1="188" y1="384" x2="240" y2="384" stroke="#cbd5e1" stroke-width="10" stroke-linecap="round"/>
